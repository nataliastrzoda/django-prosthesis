{% extends 'base.html' %}
{% block title %}Nowa proteza{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card shadow-sm">
      <div class="card-header bg-success text-white">
        <i class="fa-solid fa-plus-circle me-2"></i><strong>Dodaj nową protezę do katalogu</strong>
      </div>
      <div class="card-body">
        <form method="post" id="prosthesisForm">
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label for="{{ field.id_for_label }}" class="form-label fw-semibold">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <div class="text-danger small mt-1">
              {% for e in field.errors %}<div>{{ e }}</div>{% endfor %}
            </div>
            {% endif %}
          </div>
          {% endfor %}
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-success">
              <i class="fa-solid fa-floppy-disk me-2"></i>Zapisz protezę
            </button>
            <a href="{% url 'home' %}" class="btn btn-outline-secondary">
              <i class="fa-solid fa-xmark me-2"></i>Anuluj
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const typeSelect = document.getElementById("id_limb_type");
    const levelSelect = document.getElementById("id_amputation_level");
    
    // Zapamiętujemy pierwotne opcje wygenerowane przez Django
    const originalOptions = Array.from(levelSelect.options);

    function updateLevels() {
        const selectedType = typeSelect.value;
        const currentSelection = levelSelect.value;
        
        // Czyścimy obecny wybór
        levelSelect.innerHTML = '';
        
        // Zawsze dodajemy opcję pustą (---------)
        levelSelect.appendChild(originalOptions[0].cloneNode(true));

        originalOptions.forEach(function(opt) {
            const val = opt.value;
            let shouldShow = false;
            
            if (selectedType === "Noga" && ["Udo", "Podudzie", "Staw biodrowy"].includes(val)) {
                shouldShow = true;
            } else if (selectedType === "Ręka" && ["Ramię", "Przedramię", "Dłoń"].includes(val)) {
                shouldShow = true;
            }

            if (shouldShow) {
                const newOpt = opt.cloneNode(true);
                if (val === currentSelection) newOpt.selected = true;
                levelSelect.appendChild(newOpt);
            }
        });
    }

    typeSelect.addEventListener("change", updateLevels);
    updateLevels(); // Odpalenie logiki na start
});
</script>
{% endblock %}
