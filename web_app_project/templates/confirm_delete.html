{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger shadow-sm">
      <div class="card-header bg-danger text-white fw-semibold">
        <i class="fa-solid fa-triangle-exclamation me-2"></i>Potwierdzenie usunięcia
      </div>
      <div class="card-body text-center py-4">
        <p class="fs-5 mb-1">Czy na pewno chcesz usunąć element:</p>
        <p class="fs-4 fw-bold text-danger mb-4">{{ object_name }}</p>
        <p class="text-muted small mb-4">
          {{ warning_text }}
        </p>
        <div class="d-flex justify-content-center gap-3">
          <a href="{{ cancel_url }}" class="btn btn-outline-secondary px-4">
            <i class="fa-solid fa-xmark me-1"></i>Anuluj
          </a>
          <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger px-4">
              <i class="fa-solid fa-trash me-1"></i>Tak, usuń
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
