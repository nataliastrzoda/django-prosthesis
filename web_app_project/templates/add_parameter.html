{% extends 'base.html' %}
{% block title %}Nowy parametr{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-6">
  <div class="card">
    <div class="card-header bg-info text-white">
      <i class="fa-solid fa-sliders me-2"></i><strong>Nowy parametr</strong>
    </div>
    <div class="card-body">
      <form method="post">{% csrf_token %}
        {% for field in form %}<div class="mb-3">
          <label for="{{ field.id_for_label }}" class="form-label fw-semibold">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<div class="text-danger small mt-1">{% for e in field.errors %}<div>{{ e }}</div>{% endfor %}</div>{% endif %}
        </div>{% endfor %}
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-info text-white"><i class="fa-solid fa-floppy-disk me-2"></i>Zapisz</button>
          <a href="{% url 'home' %}" class="btn btn-outline-secondary"><i class="fa-solid fa-xmark me-2"></i>Anuluj</a>
        </div>
      </form>
    </div>
  </div>
</div></div>
{% endblock %}
